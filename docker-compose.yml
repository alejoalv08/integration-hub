version: '3.8'

services:

  # ─── Service A: Source API ───────────────────────────────────
  source-api:
    build:
      context: ./source-api
      dockerfile: Dockerfile
    container_name: integration-hub-source
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/../data
    restart: unless-stopped

  # ─── Service B: Gateway API ──────────────────────────────────
  gateway-api:
    build:
      context: ./gateway-api
      dockerfile: Dockerfile
    container_name: integration-hub-gateway
    ports:
      - "3002:3002"
    env_file:
      - ./gateway-api/.env
    environment:
      - SOURCE_API_URL=http://source-api:3001
    depends_on:
      - source-api
    restart: unless-stopped
